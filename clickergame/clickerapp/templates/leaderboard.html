
{% extends "base.html" %}

{% block content %}

<h1>Leaderboard</h1>

<table>

<tr>
    <th>#</th>
    <th>Player</th>
    <th>Score</th>
    
</tr>

{% for player in players %}

<tr>

<td>
{{ forloop.counter }}
</td>

<td>
{{ player.user.username }}
</td>

<td>
{{ player.score }}
</td>

</tr>

{% endfor %}

</table>

{% endblock %}
