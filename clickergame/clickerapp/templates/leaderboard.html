
{% extends "base.html" %}

{% block content %}


<h1>Leaderboard</h1>
<p></p>
<table>

<tr>

<th>#</th>
<th>Name</th>

<th>Rocks</th>
<th>Gems💎</th>
<th>Asteroids☄️</th>





</tr>


{% for player in players %}

<tr>

<td>
{{ forloop.counter }}
</td>

<td>
{{ player.profile.user.username }}
</td>


<td>
{{ player.profile.score }}
</td>


<td>
{{ player.profile.crystals }}
</td>


<td>
{{ player.profile.asteroids }}
</td>



</tr>

{% endfor %}

</table>

{% endblock %}
