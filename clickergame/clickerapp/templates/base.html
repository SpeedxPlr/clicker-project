{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}My App{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'clickerapp/style.css' %}">
  
</head>
<body class="
{% if profile.asteroid_unlocked %}
asteroid-theme
{% elif profile.prestige_unlocked %}
crystal-theme
{% else %}
rock-theme
{% endif %}
">
    <nav class="navbar">
    <div class="nav-logo">🪨 Rock Clicker</div>
    <a href="{% url 'home' %}">Home</a>
    <a href="{% url 'leaderboard' %}">Leaderboard</a>
    <a href="{% url 'profile' %}">Profile</a>
    {% if user.is_authenticated %}
        <form action="{% url 'logout' %}"
              method="post"
              class="logout-form">

            {% csrf_token %}

            <button type="submit" class="nav-button">
                Logout
            </button>

        </form>
    {% else %}
        <a href="{% url 'login' %}">Login</a>
    {% endif %}

</nav>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>


  <script src="{% static 'clickerapp/script.js' %}?v=12">
fetch("/upgrades/")
  .then(res => res.json())
  .then(data => {
      renderUpgrades(data.upgrades);
  });
</script>

  
</body>
</html>
