{% extends "base.html" %}

{% block title %}Login{% endblock %}


{% block content %}
<h2 class="title">Login</h2>

<form method="post">
    {% if form.errors %}
    <div class="errors">
        {{ form.errors }}
    </div>
    {% endif %}
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="create-account-btn">Login</button>
    <p></p>
    <p>Don't have an account?</p>

    <a class="btn create-account-btn" href="{% url 'register' %}" style="text-decoration: none;"> Create Account </a>
</form>
{% endblock %}
