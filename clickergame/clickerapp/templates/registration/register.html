{% extends "base.html" %}

{% block content %}

<h1 class="title">Create Account</h1>

<form method="POST">
    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit">
        Register
    </button>
    
</form>
{% if form.errors %}
    <div style="color:red;">
        {{ form.errors }}
    </div>
{% endif %}
{% endblock %}
